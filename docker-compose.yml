version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hopeaid_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hopeaid
      POSTGRES_PASSWORD: hopeaid
      POSTGRES_DB: hopeaid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hopeaid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hopeaid_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  api:
    build: .
    container_name: hopeaid_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://hopeaid:hopeaid@db:5432/hopeaid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WEB_CONCURRENCY: 2
      RUN_MIGRATIONS: "true"
    command: sh scripts/start-web.sh

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    build: .
    container_name: hopeaid_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://hopeaid:hopeaid@db:5432/hopeaid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh scripts/start-worker.sh

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────────
  beat:
    build: .
    container_name: hopeaid_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://hopeaid:hopeaid@db:5432/hopeaid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    command: sh scripts/start-beat.sh

  # ── Flower (Celery Monitor) ───────────────────────────────────────────────────
  flower:
    build: .
    container_name: hopeaid_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
    ports:
      - "5555:5555"
    command: celery -A app.workers.celery_app flower --port=5555

volumes:
  postgres_data:
